# Layanan database
services:
  db-webdinamis:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: password!123
      MARIADB_DATABASE: dbcompro_nim
      MARIADB_USER: userwebdinamis_nim
      MARIADB_PASSWORD: O)xz6GWEwDOx1Ea9
    volumes:
      - db_data:/var/lib/mysql
      - ./db_data/dbcompro_nim.sql:/docker-entrypoint-initdb.d/dbcompro_nim.sql:ro
    restart: always

  container-statis:
    image: ${DOCKERHUB_USERNAME}/himafor_nim:latest
    ports:
      - "80:80"
    restart: always

  container-dinamis:
    image: ${DOCKERHUB_USERNAME}/web-dinamis:latest
    ports:
      - "3000:3000"
    restart: always
    environment:
      DB_USER: userwebdinamis_nim
      DB_PASSWORD: O)xz6GWEwDOx1Ea9
      DB_NAME: dbcompro_nim
      DB_HOST: db-webdinamis
    depends_on:
      - db-webdinamis

volumes:
  db_data: {}
