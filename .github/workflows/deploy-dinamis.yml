name: Deploy Web Dinamis to AWS EC2
on:
  push:
    branches: [ main ]
    paths: 
      - 'web-dinamis/**'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web-dinamis
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis:latest
      
  Deploy to EC2 via SSH and run docker compose:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      -name: Remove dummy SQL file
       uses: appleboy/ssh-action@v1.0.3
       with: 
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          sudo rm -rf /home/ubuntu/kontainer-dinamis/database_compro

      -name: Copy Compose File ke EC2 
       uses: appleboy/scp-action@master
       with: 
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        source: ".\docker-compose.yml, web-dinamis/database/dbcompro_nim.sql"
        target: "/home/ubuntu/kontainer-dinamis"
        strip_components: 1

        -name: SSH to EC2 and Run Docker Compose
         uses: appleboy/ssh-action@master
         with: 
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
          cd /home/ubuntu/kontainer-dinamis
          sudo docker compose down
          sudo docker compose up -d
          